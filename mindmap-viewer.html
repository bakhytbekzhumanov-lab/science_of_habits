<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Mind Map Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6e1;overflow:hidden;width:100vw;height:100vh}
#canvas{width:100%;height:100%;cursor:grab;position:relative;overflow:hidden}
#canvas.grabbing{cursor:grabbing}
#world{position:absolute;transform-origin:0 0;will-change:transform}
svg.cn{position:absolute;top:0;left:0;width:8000px;height:6000px;pointer-events:none;z-index:0}
svg.cn path{fill:none;stroke-width:2;opacity:0.35}
.nd{position:absolute;border-radius:16px;padding:14px 18px;cursor:default;z-index:1;opacity:0;animation:fi .5s ease forwards;user-select:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.nd:hover{transform:scale(1.06)!important;z-index:10}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nd.ct{border-radius:50%;width:210px;height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:5;font-family:'Space Mono',monospace}
.nd.ct .t{font-size:16px;font-weight:700;letter-spacing:-.5px;line-height:1.15;color:#0a0a0f}
.nd.ct .s{font-size:10px;opacity:.6;margin-top:5px;color:#0a0a0f}
.nd.br{border:2px solid;backdrop-filter:blur(8px);min-width:155px;text-align:center}
.nd.br .n{font-family:'Space Mono',monospace;font-size:34px;font-weight:700;line-height:1;opacity:.12;position:absolute;top:6px;right:12px}
.nd.br .t{font-size:15px;font-weight:700;letter-spacing:-.3px}
.nd.br .d{font-size:11px;opacity:.6;margin-top:4px;line-height:1.35}
.nd.lf{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(5px);max-width:215px;font-size:12px;line-height:1.45;padding:10px 14px}
.nd.lf .k{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;opacity:.5}
.ui{position:fixed;bottom:20px;right:20px;display:flex;gap:6px;z-index:100}
.ui button{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(10,10,15,.85);backdrop-filter:blur(8px);color:#e8e6e1;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ui button:hover{background:rgba(255,255,255,.1)}
.bk{position:fixed;top:20px;left:20px;z-index:100;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(10,10,15,.85);backdrop-filter:blur(8px);color:#e8e6e1;font-size:13px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.bk:hover{background:rgba(255,255,255,.1)}
.hd{position:fixed;top:20px;right:20px;z-index:100;font-size:11px;opacity:.4;font-family:'Space Mono',monospace;text-align:right;max-width:280px}
body::after{content:'';position:fixed;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="200" height="200" filter="url(%23n)" opacity="0.035"/></svg>');pointer-events:none;z-index:999}
</style>
</head>

23:{title:"4 СПОСОБА\n↑СЕРОТОНИН",sub:"Young S. 2002\nJ Psychiatry & Neuroscience",c1:"#6bcb77",c2:"#38bdf8",branches:[
  {color:"#6bcb77",label:"☀",title:"СОЛНЦЕ",desc:"Яркий свет",x:-480,y:-280,leaves:[{lbl:"Механизм",txt:"Яркий свет → ↑серотонин. 30 мин на улице утром = антидепрессант",dx:-270,dy:-60},{lbl:"SAD",txt:"Seasonal Affective Disorder: зимой мало света → ↓серотонин → депрессия",dx:-280,dy:60}]},
  {color:"#38bdf8",label:"🏃",title:"УПРАЖНЕНИЯ",desc:"Аэробные",x:480,y:-280,leaves:[{lbl:"Триптофан",txt:"Упражнения ↑свободный триптофан → проникает через ГЭБ → ↑5-HT",dx:270,dy:-60},{lbl:"Доза",txt:"30 мин умеренного бега 3-5 раз в неделю. Эффект кумулятивный",dx:280,dy:60}]},
  {color:"#ffd93d",label:"🙏",title:"БЛАГОДАРНОСТЬ",desc:"Позитивные мысли",x:-450,y:300,leaves:[{lbl:"Механизм",txt:"Вспоминание позитивного активирует серотонинергические пути напрямую",dx:-260,dy:-50},{lbl:"Практика",txt:"Дневник благодарности, 3 вещи перед сном. Работает через 3 недели",dx:-280,dy:60}]},
  {color:"#ff8fab",label:"🍗",title:"ТРИПТОФАН",desc:"Диета",x:450,y:300,leaves:[{lbl:"Продукты",txt:"Индейка, яйца, орехи, сыр, бананы, тёмный шоколад, лосось",dx:260,dy:-50},{lbl:"Механизм",txt:"Триптофан → предшественник серотонина. Без него — дефицит 5-HT",dx:280,dy:60}]},
]},
24:{title:"OXYTOCIN\nINCREASES\nTRUST",sub:"Kosfeld, Zak 2005\nNature",c1:"#ff8fab",c2:"#a78bfa",branches:[
  {color:"#ff8fab",label:"01",title:"ЭКСПЕРИМЕНТ",desc:"Trust Game",x:-480,y:-280,leaves:[{lbl:"Метод",txt:"Интраназальный спрей OXT vs плацебо → Trust Game с деньгами",dx:-270,dy:-60},{lbl:"Результат",txt:"+17% денег отдавали незнакомцу. Первое прямое доказательство",dx:-280,dy:60}]},
  {color:"#a78bfa",label:"02",title:"МЕХАНИЗМ",desc:"Нейрохимия доверия",x:480,y:-280,leaves:[{lbl:"Амигдала",txt:"OXT снижает активность амигдалы → меньше страха → больше доверия",dx:270,dy:-60},{lbl:"Nature",txt:"Публикация в Nature — одна из самых цитируемых в соц. нейронауке",dx:280,dy:60}]},

]},
29:{title:"RUNNER'S\nHIGH",sub:"Boecker H. 2008\nCerebral Cortex — PET scan",c1:"#a78bfa",c2:"#34d399",branches:[
  {color:"#a78bfa",label:"01",title:"ПЭТ-СКАН",desc:"Первое прямое доказательство",x:-550,y:-350,leaves:[{lbl:"Метод",txt:"ПЭТ с радиолигандом [11C]diprenorphine ДО и ПОСЛЕ 2 часов бега. Сканирование опиоидных рецепторов",dx:-280,dy:-110},{lbl:"Участники",txt:"10 тренированных бегунов. 2 часа непрерывного бега на выносливость (не спринт)",dx:-320,dy:30},{lbl:"Результат",txt:"Значительное связывание β-эндорфинов с μ-опиоидными рецепторами в PFC и лимбической системе",dx:-220,dy:140}]},
  {color:"#34d399",label:"02",title:"ОБЛАСТИ\nМОЗГА",desc:"Где работают эндорфины",x:550,y:-350,leaves:[{lbl:"PFC",txt:"Префронтальная кора: ощущение благополучия, снижение тревоги, позитивная оценка ситуации",dx:280,dy:-110},{lbl:"Лимбика",txt:"Амигдала, гиппокамп, инсула: эмоциональная обработка, снижение болевых сигналов",dx:320,dy:30},{lbl:"ACC",txt:"Передняя поясная кора: интеграция эмоций и ощущений. Центр 'всё хорошо'",dx:240,dy:140}]},
  {color:"#ffd93d",label:"03",title:"КОРРЕЛЯЦИЯ",desc:"Субъективно = объективно",x:-500,y:250,leaves:[{lbl:"Эйфория",txt:"Уровень связывания эндорфинов r=0.72 с субъективным ощущением эйфории. Сильная корреляция!",dx:-280,dy:-70},{lbl:"Не плацебо",txt:"До этого исследования runner's high считали 'мифом' или плацебо. ПЭТ доказал: реальная нейрохимия",dx:-300,dy:60}]},
  {color:"#ff6b6b",label:"04",title:"ПОРОГ",desc:"Когда включается",x:500,y:250,leaves:[{lbl:"Интенсивность",txt:">60-70% VO2max. Лёгкая прогулка или йога НЕ дают значимого выброса β-эндорфинов",dx:280,dy:-70},{lbl:"Длительность",txt:">30 мин непрерывно. Пик: 45-120 мин. Ультрамарафонцы сообщают о мощнейшей эйфории",dx:300,dy:60}]},
  {color:"#ff8fab",label:"★",title:"ПРАКТИКА",desc:"Как получить runner's high",x:0,y:480,leaves:[{lbl:"Бег",txt:"45-90 мин в темпе 'могу говорить, но не хочу'. Зона 3 ЧСС. Ритмичное дыхание",dx:-250,dy:80},{lbl:"Альтернативы",txt:"Велосипед, плавание, гребля — любое ритмичное аэробное >30 мин работает",dx:250,dy:80}]}
]},
30:{title:"SOCIAL\nLAUGHTER",sub:"Dunbar R. et al. 2012\nProc Royal Society B",c1:"#a78bfa",c2:"#ff8fab",branches:[
  {color:"#a78bfa",label:"01",title:"ЭКСПЕРИМЕНТ",desc:"Смех → болевой порог",x:-550,y:-350,leaves:[{lbl:"Метод",txt:"Измерение болевого порога (давление на руку) ДО и ПОСЛЕ: 1) просмотр комедии в группе, 2) просмотр скучного, 3) комедия в одиночестве",dx:-280,dy:-110},{lbl:"Результат",txt:"+10% болевой порог после группового смеха. Скучное видео и одиночный смех — без эффекта",dx:-320,dy:30},{lbl:"Биомаркер",txt:"Повышение болевого порога = биомаркер эндорфиновой активности. Эндорфины = эндогенные опиаты",dx:-220,dy:140}]},
  {color:"#ff8fab",label:"02",title:"СОЦИАЛЬНЫЙ\nvs ОДИНОЧНЫЙ",desc:"Группа >> один",x:550,y:-350,leaves:[{lbl:"Ключевой инсайт",txt:"Смех В ГРУППЕ → эндорфины. Смех В ОДИНОЧЕСТВЕ → слабый или нулевой эффект. Социальность = ключ",dx:280,dy:-100},{lbl:"Эволюция",txt:"Dunbar: групповой смех — эволюционный механизм social bonding. Замена groomingу у приматов",dx:320,dy:30},{lbl:"Масштаб",txt:"Grooming = связь 1-к-1 (max ~50 друзей). Смех/пение/танцы = связь 1-ко-многим (до 150 — число Данбара)",dx:240,dy:130}]},
  {color:"#ffd93d",label:"03",title:"МЕХАНИЗМ",desc:"Почему смех запускает",x:-480,y:300,leaves:[{lbl:"Диафрагма",txt:"Продолжительный смех = серия резких выдохов через сжатую диафрагму. Физически = как мини-тренировка",dx:-270,dy:-70},{lbl:"Синхронность",txt:"Групповой смех синхронизирует дыхание и мимику. Синхронность → OXT + эндорфины → 'мы вместе'",dx:-290,dy:60},{lbl:"Заразительность",txt:"Смех заразителен (mirror neurons). Услышал → засмеялся → цепная реакция → все получают дозу",dx:-220,dy:150}]},
  {color:"#34d399",label:"04",title:"ДРУГИЕ\nГРУППОВЫЕ",desc:"Не только смех",x:480,y:300,leaves:[{lbl:"Пение",txt:"Хоровое пение: +50% pain threshold. Мощнее одиночного. Церковные хоры, караоке, колыбельные",dx:270,dy:-70},{lbl:"Танцы",txt:"Синхронные танцы: +повышение болевого порога + ↑OXT. Ритуальные танцы во всех культурах",dx:290,dy:60},{lbl:"Барабаны",txt:"Групповое барабанение: ↑эндорфины, ↓кортизол. Используется в музыкотерапии",dx:240,dy:150}]},
  {color:"#38bdf8",label:"★",title:"ЧИСЛО\nДАНБАРА",desc:"150 связей через ритуал",x:0,y:500,leaves:[{lbl:"Grooming limit",txt:"Приматы поддерживают ~50 связей через grooming. Людям нужен больший масштаб",dx:-250,dy:80},{lbl:"150",txt:"Смех, пение, танцы, ритуалы → эндорфины для групп до 150 чел. 'Социальный клей' цивилизации",dx:250,dy:80}]}
]},
31:{title:"ENDOCANNA-\nBINOIDS",sub:"Fuss J. et al. 2017\nPNAS — Beyond Endorphins",c1:"#a78bfa",c2:"#6bcb77",branches:[
  {color:"#a78bfa",label:"01",title:"ПРОБЛЕМА\nЭНДОРФИНОВ",desc:"Слишком большие молекулы",x:-550,y:-350,leaves:[{lbl:"ГЭБ",txt:"Гемато-энцефалический барьер: β-эндорфины (крупные пептиды) с ТРУДОМ проникают в мозг из крови",dx:-280,dy:-100},{lbl:"Парадокс",txt:"Если эндорфины из крови не проходят в мозг — как они вызывают эйфорию? Нужна другая молекула",dx:-320,dy:40},{lbl:"Налтрексон",txt:"Блокирование опиоидных рецепторов (налтрексон) НЕ полностью отменяло runner's high. Что-то ещё",dx:-220,dy:140}]},
  {color:"#6bcb77",label:"02",title:"АНАНДАМИД",desc:"Ключевая молекула",x:550,y:-350,leaves:[{lbl:"Структура",txt:"Анандамид (N-arachidonoylethanolamine) — эндоканнабиноид. Маленькая липофильная молекула",dx:280,dy:-100},{lbl:"ГЭБ",txt:"Свободно проникает через ГЭБ (в отличие от эндорфинов). Быстрый доступ к мозговым рецепторам",dx:320,dy:40},{lbl:"Рецепторы",txt:"Связывается с CB1 и CB2 рецепторами — те же, что активирует THC (каннабис). Но эндогенно!",dx:240,dy:140}]},
  {color:"#ffd93d",label:"03",title:"ЭКСПЕРИМЕНТ",desc:"Мыши на колесе",x:-480,y:300,leaves:[{lbl:"Дизайн",txt:"Мыши бегали в колесе. Затем тесты: тревожность (elevated plus maze) и обезболивание (hot plate)",dx:-270,dy:-80},{lbl:"CB1 блокада",txt:"Блокирование CB1 рецепторов (rimonabant) → ОТМЕНЯЛО anxiolysis и analgesia после бега",dx:-290,dy:40},{lbl:"Опиоид блокада",txt:"Блокирование опиоидных рецепторов (налтрексон) → НЕ отменяло эффекты. Эндорфины ≠ главный игрок",dx:-220,dy:140}]},
  {color:"#ff6b6b",label:"04",title:"RUNNER'S HIGH\n= КОКТЕЙЛЬ",desc:"Не один механизм",x:480,y:300,leaves:[{lbl:"Анандамид",txt:"Главный компонент: анксиолитик (↓тревога) + анальгетик (↓боль). Проникает через ГЭБ",dx:270,dy:-70},{lbl:"β-Эндорфины",txt:"Вспомогательный компонент: работают в периферии (мышцы, суставы) + частично в мозге",dx:290,dy:50},{lbl:"2-AG",txt:"Второй эндоканнабиноид: 2-арахидоноилглицерол. Тоже повышается при беге. Усиливает анандамид",dx:250,dy:140}]},
  {color:"#38bdf8",label:"★",title:"ПРАКТИКА",desc:"Как максимизировать",x:0,y:500,leaves:[{lbl:"Оптимум",txt:"30-60 мин умеренного бега (70-80% VO2max). Слишком интенсивно = стресс. Слишком легко = нет эффекта",dx:-260,dy:80},{lbl:"Каннабис?",txt:"THC активирует те же рецепторы, но извне → толерантность → зависимость. Бег = эндогенный каннабис без побочек",dx:260,dy:80}]}
]},
32:{title:"β-ENDORPHIN\nTHRESHOLD",sub:"Goldfarb & Jamurtas 2011\nSports Medicine Review",c1:"#a78bfa",c2:"#fb923c",branches:[
  {color:"#a78bfa",label:"01",title:"ИНТЕНСИВНОСТЬ",desc:">70% VO2max",x:-550,y:-350,leaves:[{lbl:"Порог",txt:">60-70% VO2max = минимум для значимого выброса β-эндорфинов. Это зона 'тяжело, но терпимо'",dx:-280,dy:-110},{lbl:"Ниже порога",txt:"<60% VO2max (лёгкая прогулка, йога, растяжка) → β-эндорфин почти не растёт. Есть другие бонусы, но не эндорфины",dx:-320,dy:30},{lbl:"Лактатный порог",txt:"Совпадает примерно с лактатным порогом. Накопление лактата = сигнал стресса → эндорфиновый ответ",dx:-220,dy:140}]},
  {color:"#fb923c",label:"02",title:"ДЛИТЕЛЬНОСТЬ",desc:">30 минут",x:550,y:-350,leaves:[{lbl:"Минимум",txt:">30 мин непрерывной нагрузки выше порога. 20 мин = недостаточно для значимого подъёма",dx:280,dy:-100},{lbl:"Оптимум",txt:"45-90 мин: золотая зона. Достаточно для устойчивого эндорфинового ответа без перетренировки",dx:320,dy:30},{lbl:"Ультра",txt:">2 часов: максимальная концентрация β-эндорфинов. Ультрамарафонцы сообщают об интенсивнейшей эйфории",dx:240,dy:140}]},
  {color:"#34d399",label:"03",title:"ТИП\nНАГРУЗКИ",desc:"Аэробная >> анаэробная",x:-480,y:300,leaves:[{lbl:"Аэробная",txt:"Бег, велосипед, плавание, гребля — ритмичная непрерывная нагрузка. Лучший стимул для эндорфинов",dx:-270,dy:-70},{lbl:"Анаэробная",txt:"Тяжёлая атлетика, спринты — ↑эндорфины, но паттерн другой: короткие пики, не устойчивый фон",dx:-290,dy:60},{lbl:"HIIT",txt:"Интервалы: 30сек макс / 60сек отдых × 8-10. Эффективно, но не так устойчиво как steady-state бег",dx:-220,dy:150}]},
  {color:"#ffd93d",label:"04",title:"МОДУЛЯТОРЫ",desc:"Что влияет на ответ",x:480,y:300,leaves:[{lbl:"Тренированность",txt:"У тренированных базовый уровень эндорфинов ВЫШЕ + быстрее ответ. Привычка бегать = сенситизация",dx:270,dy:-80},{lbl:"Стресс",txt:"Психологический стресс перед тренировкой УСИЛИВАЕТ эндорфиновый ответ. Стресс + спорт = мощная разрядка",dx:290,dy:40},{lbl:"Музыка",txt:"Музыка во время тренировки: ↑удовольствие, ↑выносливость, но влияние на β-эндорфины неоднозначно",dx:240,dy:140}]},
  {color:"#ff8fab",label:"★",title:"РЕЦЕПТ",desc:"Оптимальная тренировка",x:0,y:500,leaves:[{lbl:"Формула",txt:"45 мин бега при ЧСС 140-160 (70-80% от макс) = надёжный эндорфиновый ответ. 3-4 раза/неделю",dx:-260,dy:80},{lbl:"Субъективно",txt:"Тест разговора: можешь сказать фразу, но не хочешь болтать. Если можешь петь = слишком легко",dx:260,dy:80}]}
]},
68:{title:"SOCIAL\nBONDING\nANALGESIA",sub:"Machin & Dunbar 2016\nEndorphin Theory of Affiliation",c1:"#a78bfa",c2:"#ff8fab",branches:[
  {color:"#a78bfa",label:"01",title:"ЭНДОРФИНОВАЯ\nТЕОРИЯ СВЯЗИ",desc:"Brain Opioid Theory",x:-550,y:-350,leaves:[{lbl:"Гипотеза",txt:"Социальные связи у приматов поддерживаются через μ-опиоидную (эндорфиновую) систему. Связь = нейрохимический кайф",dx:-280,dy:-110},{lbl:"Grooming",txt:"Приматы: взаимный груминг → ↑β-эндорфины у ОБОИХ. Удовольствие от прикосновений = эндорфины",dx:-320,dy:30},{lbl:"Разлука",txt:"Разлука с близким → ↓эндорфины → withdrawal-подобное состояние. Тоска = буквально ломка",dx:-220,dy:140}]},
  {color:"#ff8fab",label:"02",title:"СИНХРОННЫЕ\nАКТИВНОСТИ",desc:"Делаем вместе → связь",x:550,y:-350,leaves:[{lbl:"Смех",txt:"Групповой смех: +10% болевой порог (Dunbar 2012). Самый доступный эндорфиновый ритуал",dx:280,dy:-110},{lbl:"Пение",txt:"Хоровое пение: +50% pain threshold + ↑OXT + ↑чувство принадлежности. Церкви, фольклор, караоке",dx:320,dy:30},{lbl:"Танцы",txt:"Синхронные танцы: ↑эндорфины + ↑кооперация в последующих играх. Ритуалы ВСЕХ культур мира",dx:240,dy:130},{lbl:"Музыка",txt:"Совместное музицирование: барабаны, джем-сессии → ↑эндорфины, ↓кортизол. Музыкотерапия",dx:280,dy:220}]},
  {color:"#ffd93d",label:"03",title:"ЭВОЛЮЦИЯ",desc:"От grooming к ритуалу",x:-480,y:300,leaves:[{lbl:"Проблема",txt:"Grooming = 1-к-1, ~20 мин/пару. Для группы 150 чел нужно 6+ часов/день. Невозможно!",dx:-270,dy:-80},{lbl:"Решение",txt:"Смех, пение, танцы = 'grooming at a distance'. Один ритуал обслуживает 150 связей одновременно",dx:-290,dy:40},{lbl:"Религия",txt:"Совместная молитва, песнопения, ритуалы = древнейший social bonding через синхронные эндорфины",dx:-220,dy:140}]},
  {color:"#34d399",label:"04",title:"ОТЛИЧИЕ\nОТ ОКСИТОЦИНА",desc:"Два пути привязанности",x:480,y:300,leaves:[{lbl:"Эндорфины",txt:"Широкая привязанность: группа, команда, община. Через совместные активности. 'Мы вместе кайфуем'",dx:270,dy:-70},{lbl:"Окситоцин",txt:"Глубокая привязанность: мать-ребёнок, партнёр, близкий друг. Через прикосновения и доверие",dx:290,dy:50},{lbl:"Вместе",txt:"Эндорфины = 'клей для группы'. Окситоцин = 'клей для пары'. Оба нужны для полноценной социальной жизни",dx:250,dy:140}]},
  {color:"#38bdf8",label:"★",title:"ПРАКТИКА",desc:"Как использовать",x:0,y:500,leaves:[{lbl:"Группы",txt:"Хор, танцы, командный спорт, совместная готовка, настольные игры с смехом → все дают эндорфины",dx:-260,dy:80},{lbl:"Ежедневно",txt:"Минимум 1 совместная активность в день: обед с коллегами, прогулка с другом, игра с детьми",dx:260,dy:80}]}
]},

// ============ Fallback for sources without custom maps ============
function fallbackMap(id) {
  var p = new URLSearchParams(window.location.search);
  var title = (p.get('title')||'SOURCE '+id).substring(0,28).toUpperCase();
  var authors = p.get('authors')||'';
  var cat = p.get('cat')||'habits';
  var finding = p.get('finding')||'';
  var concepts = p.get('concepts') ? p.get('concepts').split('|').filter(Boolean) : [];
  var practices = p.get('practices') ? p.get('practices').split('|').filter(Boolean) : [];
  var cc = {habits:"#ff6b6b",dopamine:"#ffd93d",serotonin:"#6bcb77",oxytocin:"#ff8fab",endorphins:"#a78bfa",willpower:"#fb923c",flow:"#38bdf8",behavior:"#34d399",neuro:"#f472b6",positive:"#facc15"};
  var color = cc[cat]||"#ff6b6b";
  var branches = [];
  if (finding) {
    var sents = finding.split(/\.\s+/).filter(function(s){return s.length>15;});
    for (var i=0; i<Math.min(sents.length,4); i++) {
      var angle = (i/Math.min(sents.length,4))*Math.PI*2 - Math.PI/2;
      branches.push({color:[color,"#38bdf8","#34d399","#a78bfa"][i%4],label:String(i+1).padStart(2,'0'),title:sents[i].substring(0,25).toUpperCase(),desc:"",x:Math.round(Math.cos(angle)*450),y:Math.round(Math.sin(angle)*400),leaves:[]});
    }
  }
  if (concepts.length>0) {
    var leaves = [];
    for (var j=0; j<Math.min(concepts.length,5); j++) {
      leaves.push({lbl:"•",txt:concepts[j],dx:260,dy:-80+j*50});
    }
    branches.push({color:"#a78bfa",label:"◆",title:"КОНЦЕПЦИИ",desc:concepts.length+" ключевых",x:480,y:250,leaves:leaves});
  }
  if (practices.length>0) {
    var pl = [];
    for (var k=0; k<Math.min(practices.length,4); k++) {
      pl.push({lbl:"→",txt:practices[k],dx:-260,dy:-60+k*50});
    }
    branches.push({color:"#34d399",label:"✓",title:"ПРАКТИКА",desc:practices.length+" выводов",x:-480,y:280,leaves:pl});
  }
  return {title:title.replace(/\n/g,'\\n'),sub:authors+'\\n#'+id,c1:color,c2:"#f7c948",branches:branches};
}

// ============ PAN / ZOOM ENGINE ============
var world=document.getElementById('world'),canvas=document.getElementById('canvas'),svg=document.getElementById('svg');
var scale=0.48,panX=0,panY=0,isDrag=false,sx,sy;
function upd(){world.style.transform='translate('+panX+'px,'+panY+'px) scale('+scale+')';}
canvas.addEventListener('mousedown',function(e){isDrag=true;sx=e.clientX-panX;sy=e.clientY-panY;canvas.classList.add('grabbing');});
window.addEventListener('mousemove',function(e){if(!isDrag)return;panX=e.clientX-sx;panY=e.clientY-sy;upd();});
window.addEventListener('mouseup',function(){isDrag=false;canvas.classList.remove('grabbing');});
canvas.addEventListener('touchstart',function(e){if(e.touches.length===1){isDrag=true;sx=e.touches[0].clientX-panX;sy=e.touches[0].clientY-panY;}},{passive:true});
canvas.addEventListener('touchmove',function(e){if(!isDrag||e.touches.length!==1)return;panX=e.touches[0].clientX-sx;panY=e.touches[0].clientY-sy;upd();},{passive:true});
canvas.addEventListener('touchend',function(){isDrag=false;});
canvas.addEventListener('wheel',function(e){e.preventDefault();var d=e.deltaY>0?.9:1.1;var ns=Math.min(2,Math.max(.12,scale*d));var r=canvas.getBoundingClientRect();var mx=e.clientX-r.left,my=e.clientY-r.top;panX=mx-(mx-panX)*(ns/scale);panY=my-(my-panY)*(ns/scale);scale=ns;upd();},{passive:false});
function zi(){scale=Math.min(2,scale*1.3);upd();}
function zo(){scale=Math.max(.12,scale*.75);upd();}
function rv(){var vw=window.innerWidth,vh=window.innerHeight;scale=0.48;panX=vw/2-3000*scale;panY=vh/2-2000*scale;upd();}

function curve(x1,y1,x2,y2,col){
  var dx=x2-x1,dy=y2-y1;
  var p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M '+x1+' '+y1+' C '+(x1+dx*.4)+' '+(y1+dy*.08)+', '+(x2-dx*.4)+' '+(y2-dy*.08)+', '+x2+' '+y2);
  p.setAttribute('stroke',col);
  svg.appendChild(p);
}

function node(html,x,y,cls,delay){
  var el=document.createElement('div');
  el.className='nd '+cls;
  el.innerHTML=html;
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.animationDelay=delay+'s';
  world.appendChild(el);
  return el;
}

function render(data){
  var CX=3000,CY=2000;
  var ce=node('<div class="t">'+data.title.replace(/\\n/g,'<br>')+'</div><div class="s">'+data.sub.replace(/\\n/g,'<br>')+'</div>',CX-105,CY-105,'ct',0);
  ce.style.background='linear-gradient(135deg,'+data.c1+','+data.c2+')';
  ce.style.boxShadow='0 0 60px '+data.c1+'44, 0 0 120px '+data.c1+'15';
  document.getElementById('hd').textContent=data.title.replace(/\\n/g,' ')+' · scroll / drag';
  var dl=0.1;
  data.branches.forEach(function(b){
    var bx=CX+b.x,by=CY+b.y;
    curve(CX,CY,bx+75,by+25,b.color);
    var bn=node('<div class="n">'+b.label+'</div><div class="t">'+b.title.replace(/\\n/g,'<br>')+'</div><div class="d">'+b.desc+'</div>',bx,by,'br',dl);
    bn.style.borderColor=b.color;
    bn.style.background=b.color+'0d';
    bn.style.color=b.color+'dd';
    dl+=0.06;
    (b.leaves||[]).forEach(function(l){
      var lx=bx+l.dx,ly=by+l.dy;
      curve(bx+75,by+25,lx+90,ly+15,b.color);
      node('<div class="k" style="color:'+b.color+'">'+l.lbl+'</div><div>'+l.txt+'</div>',lx,ly,'lf',dl);
      dl+=0.04;
    });
  });
  setTimeout(rv,80);
}

var params=new URLSearchParams(window.location.search);
var sourceId=parseInt(params.get('id'))||1;
var mapData=MAPS[sourceId]||fallbackMap(sourceId);
render(mapData);
</script>
