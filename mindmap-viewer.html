<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#e8e6e1;overflow:hidden;width:100vw;height:100vh}
#canvas{width:100%;height:100%;cursor:grab;position:relative;overflow:hidden}
#canvas.grabbing{cursor:grabbing}
#world{position:absolute;transform-origin:0 0;will-change:transform}
svg.conn{position:absolute;top:0;left:0;width:6000px;height:4000px;pointer-events:none;z-index:0}
svg.conn path{fill:none;stroke-width:2;opacity:0.35}
.nd{position:absolute;border-radius:16px;padding:14px 18px;cursor:default;z-index:1;opacity:0;animation:fadeIn .5s ease forwards;user-select:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.nd:hover{transform:scale(1.05)!important;z-index:10}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.nd--center{background:linear-gradient(135deg,var(--c1),var(--c2));color:#0a0a0f;border-radius:50%;width:200px;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 0 60px var(--glow);z-index:5;font-family:'Space Mono',monospace}
.nd--center .t{font-size:15px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.nd--center .s{font-size:10px;opacity:.65;margin-top:4px}
.nd--branch{border:2px solid var(--bc);backdrop-filter:blur(8px);min-width:150px;text-align:center;background:var(--bg)}
.nd--branch .num{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;line-height:1;opacity:.12;position:absolute;top:6px;right:12px}
.nd--branch .t{font-size:16px;font-weight:700;letter-spacing:-.3px}
.nd--branch .d{font-size:11px;opacity:.65;margin-top:4px;line-height:1.35}
.nd--leaf{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(5px);max-width:210px;font-size:12px;line-height:1.45;padding:10px 14px}
.nd--leaf .lbl{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;opacity:.5}
.ctrl{position:fixed;bottom:20px;right:20px;display:flex;gap:6px;z-index:100}
.ctrl button{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(10,10,15,.85);backdrop-filter:blur(8px);color:#e8e6e1;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ctrl button:hover{background:rgba(255,255,255,.1)}
.back{position:fixed;top:20px;left:20px;z-index:100;padding:8px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(10,10,15,.85);backdrop-filter:blur(8px);color:#e8e6e1;font-size:13px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.back:hover{background:rgba(255,255,255,.1)}
.legend{position:fixed;top:20px;right:20px;z-index:100;font-size:11px;opacity:.4;font-family:'Space Mono',monospace;text-align:right;max-width:300px}
body::after{content:'';position:fixed;inset:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="300" height="300" filter="url(%23n)" opacity="0.04"/></svg>');pointer-events:none;z-index:999}
</style>
</head>
<body>
<a class="back" href="index.html">← Назад к списку</a>
<div class="legend" id="legend"></div>
<div class="ctrl">
<button onclick="zoomIn()" title="Zoom In">+</button>
<button onclick="zoomOut()" title="Zoom Out">−</button>
<button onclick="resetView()" title="Reset">⊙</button>
</div>

// Generate basic maps for sources that don't have custom ones
function generateDefaultMap(id) {
  // Find source data from the page that linked here
  const params = new URLSearchParams(window.location.search);
  const title = params.get('title') || 'SOURCE ' + id;
  const authors = params.get('authors') || '';
  const cat = params.get('cat') || 'habits';
  const finding = params.get('finding') || '';
  const stat = params.get('stat') || '';
  const concepts = params.get('concepts') ? params.get('concepts').split('|') : [];
  const practices = params.get('practices') ? params.get('practices').split('|') : [];

  const catColors = {habits:"#ff6b6b",dopamine:"#ffd93d",serotonin:"#6bcb77",oxytocin:"#ff8fab",endorphins:"#a78bfa",willpower:"#fb923c",flow:"#38bdf8",behavior:"#34d399",neuro:"#f472b6",positive:"#facc15"};
  const color = catColors[cat] || "#ff6b6b";

  const branches = [];
  if (finding) {
    const sentences = finding.split(/\.\s+/).filter(s => s.length > 10);
    sentences.slice(0, 4).forEach((s, i) => {
      const angle = (i / Math.min(sentences.length, 4)) * Math.PI * 2 - Math.PI / 2;
      const dist = 420;
      branches.push({
        color: [color, "#38bdf8", "#34d399", "#a78bfa", "#ffd93d"][i % 5],
        label: String(i + 1).padStart(2, '0'),
        title: s.substring(0, 30).toUpperCase(),
        desc: "",
        x: Math.cos(angle) * dist,
        y: Math.sin(angle) * dist,
        leaves: []
      });
    });
  }

  if (concepts.length > 0) {
    const cx = concepts.length > 4 ? -450 : 450;
    branches.push({
      color: "#a78bfa",
      label: "◆",
      title: "КОНЦЕПЦИИ",
      desc: concepts.length + " ключевых",
      x: cx, y: concepts.length > 4 ? 350 : -200,
      leaves: concepts.slice(0, 5).map((c, i) => ({
        lbl: "•", txt: c, dx: cx > 0 ? 250 : -250, dy: -80 + i * 55
      }))
    });
  }

  if (practices.length > 0) {
    branches.push({
      color: "#34d399",
      label: "✓",
      title: "ПРАКТИКА",
      desc: practices.length + " выводов",
      x: concepts.length > 4 ? 450 : -450, y: 350,
      leaves: practices.slice(0, 4).map((p, i) => ({
        lbl: "→", txt: p, dx: concepts.length > 4 ? 250 : -250, dy: -60 + i * 55
      }))
    });
  }

  return {
    title: title.substring(0, 30).toUpperCase(),
    sub: authors + (authors ? '\n' : '') + 'Source #' + id,
    c1: color,
    c2: "#f7c948",
    branches
  };
}

// ============ RENDER ENGINE ============
const world = document.getElementById('world');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('svg');

let scale = 0.5, panX = 0, panY = 0;
let isDragging = false, startX, startY;

function updateTransform() {
  world.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

canvas.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; canvas.classList.add('grabbing'); });
window.addEventListener('mousemove', e => { if (!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; updateTransform(); });
window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('grabbing'); });
canvas.addEventListener('touchstart', e => { if (e.touches.length===1) { isDragging=true; startX=e.touches[0].clientX-panX; startY=e.touches[0].clientY-panY; } }, {passive:true});
canvas.addEventListener('touchmove', e => { if (!isDragging||e.touches.length!==1) return; panX=e.touches[0].clientX-startX; panY=e.touches[0].clientY-startY; updateTransform(); }, {passive:true});
canvas.addEventListener('touchend', () => { isDragging=false; });
canvas.addEventListener('wheel', e => { e.preventDefault(); const d=e.deltaY>0?.92:1.08; const ns=Math.min(2,Math.max(.15,scale*d)); const r=canvas.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top; panX=mx-(mx-panX)*(ns/scale); panY=my-(my-panY)*(ns/scale); scale=ns; updateTransform(); }, {passive:false});

function zoomIn(){scale=Math.min(2,scale*1.25);updateTransform()}
function zoomOut(){scale=Math.max(.15,scale*.8);updateTransform()}
function resetView(){
  const vw=window.innerWidth, vh=window.innerHeight;
  scale=0.5; panX=vw/2-3000*scale; panY=vh/2-2000*scale;
  updateTransform();
}

function drawCurve(x1,y1,x2,y2,color) {
  const dx=x2-x1, dy=y2-y1;
  const cx1=x1+dx*.4, cy1=y1+dy*.1;
  const cx2=x2-dx*.4, cy2=y2-dy*.1;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',`M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`);
  path.setAttribute('stroke',color);
  svg.appendChild(path);
}

function makeNode(html,x,y,cls,delay) {
  const el=document.createElement('div');
  el.className='nd '+cls;
  el.innerHTML=html;
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.animationDelay=delay+'s';
  world.appendChild(el);
  return el;
}

function render(data) {
  const CX=3000, CY=2000;
  // Center node
  const ce = makeNode(
    `<div class="t">${data.title.replace(/\n/g,'<br>')}</div><div class="s">${data.sub.replace(/\n/g,'<br>')}</div>`,
    CX-100, CY-100, 'nd--center', 0
  );
  ce.style.setProperty('--c1', data.c1);
  ce.style.setProperty('--c2', data.c2);
  ce.style.setProperty('--glow', data.c1 + '44');

  document.getElementById('legend').textContent = data.title.replace(/\n/g,' ') + ' · scroll/drag';

  let delay = 0.1;
  data.branches.forEach(b => {
    const bx = CX + b.x, by = CY + b.y;
    drawCurve(CX, CY, bx+75, by+25, b.color);

    const bn = makeNode(
      `<div class="num">${b.label}</div><div class="t">${b.title.replace(/\n/g,'<br>')}</div><div class="d">${b.desc}</div>`,
      bx, by, 'nd--branch', delay
    );
    bn.style.setProperty('--bc', b.color);
    bn.style.setProperty('--bg', b.color + '0d');
    delay += 0.06;

    (b.leaves||[]).forEach(l => {
      const lx = bx + l.dx, ly = by + l.dy;
      drawCurve(bx+75, by+25, lx+90, ly+15, b.color);
      const ln = makeNode(
        `<div class="lbl" style="color:${b.color}">${l.lbl}</div><div>${l.txt}</div>`,
        lx, ly, 'nd--leaf', delay
      );
      delay += 0.04;
    });
  });

  // Center view
  setTimeout(() => {
    const vw=window.innerWidth, vh=window.innerHeight;
    panX = vw/2 - CX*scale;
    panY = vh/2 - CY*scale;
    updateTransform();
  }, 50);
}
