function HabitCurveChart() {
  const w = 560, h = 200, pad = 40;
  const data = STATS_DATA.habitTimeline;
  const xS = (d) => pad + ((d - 1) / 120) * (w - pad * 2);
  const yS = (a) => h - pad - (a / 100) * (h - pad * 2);
  const pts = data.map(d => xS(d.day) + "," + yS(d.auto)).join(" ");
  const area = xS(1) + "," + yS(0) + " " + pts + " " + xS(120) + "," + yS(0);
  return (
    <svg viewBox={"0 0 " + w + " " + h} className="w-full">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#ff6b6b" stopOpacity="0.3"/><stop offset="100%" stopColor="#ff6b6b" stopOpacity="0"/></linearGradient></defs>
      {[0,25,50,75,100].map(v => <g key={v}><line x1={pad} x2={w-pad} y1={yS(v)} y2={yS(v)} stroke="rgba(255,255,255,0.06)"/><text x={pad-6} y={yS(v)+4} fill="rgba(255,255,255,0.3)" fontSize="9" textAnchor="end" fontFamily="monospace">{v}%</text></g>)}
      {[1,21,66,120].map(d => <g key={d}><line x1={xS(d)} x2={xS(d)} y1={pad} y2={h-pad} stroke={d===66?"#ff6b6b":"rgba(255,255,255,0.06)"} strokeDasharray={d===66?"4 2":"none"}/><text x={xS(d)} y={h-pad+16} fill={d===66?"#ff6b6b":"rgba(255,255,255,0.3)"} fontSize="9" textAnchor="middle" fontFamily="monospace">{d}d</text></g>)}
      <polygon points={area} fill="url(#cg)"/>
      <polyline points={pts} fill="none" stroke="#ff6b6b" strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i) => <circle key={i} cx={xS(d.day)} cy={yS(d.auto)} r="3" fill="#08080d" stroke="#ff6b6b" strokeWidth="1.5"/>)}
      <text x={xS(66)+6} y={yS(82)-8} fill="#ff6b6b" fontSize="10" fontWeight="bold" fontFamily="monospace">← 66 дней</text>
    </svg>
  );
}

function HappinessPie() {
  const data = STATS_DATA.happinessPie;
  let cum = 0;
  const r = 70, cx = 90, cy = 90;
  return (
    <svg viewBox="0 0 260 180" className="w-full max-w-xs mx-auto">
      {data.map((d,i) => {
        const start = cum; cum += d.value;
        const a1 = (start/100)*Math.PI*2 - Math.PI/2, a2 = (cum/100)*Math.PI*2 - Math.PI/2;
        const large = d.value > 50 ? 1 : 0;
        const x1 = cx+r*Math.cos(a1), y1 = cy+r*Math.sin(a1);
        const x2 = cx+r*Math.cos(a2), y2 = cy+r*Math.sin(a2);
        const mid = (a1+a2)/2, lx = cx+(r+20)*Math.cos(mid), ly = cy+(r+20)*Math.sin(mid);
        return <g key={i}><path d={"M "+cx+" "+cy+" L "+x1+" "+y1+" A "+r+" "+r+" 0 "+large+" 1 "+x2+" "+y2+" Z"} fill={d.color} opacity="0.8"/><text x={lx} y={ly} fill="white" fontSize="9" textAnchor="middle" fontWeight="bold" fontFamily="monospace">{d.value}%</text></g>;
      })}
      {data.map((d,i) => <g key={i} transform={"translate(190,"+(40+i*28)+")"}><rect width="12" height="12" rx="3" fill={d.color} opacity="0.8"/><text x="18" y="10" fill="rgba(255,255,255,0.7)" fontSize="11">{d.label}</text></g>)}
    </svg>
  );
}

              <h3 className="text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Гормоны счастья</h3>
              <table className="w-full text-sm"><thead><tr className="text-left opacity-40 uppercase text-xs tracking-wider"><th className="pb-3 pr-4">Гормон</th><th className="pb-3 pr-4">Триггеры</th><th className="pb-3 pr-4">Эффект</th><th className="pb-3">Риск</th></tr></thead><tbody>
                {STATS_DATA.hormoneActions.map((h,i) => <tr key={i} className="border-t" style={{ borderColor: "rgba(255,255,255,0.04)" }}><td className="py-3 pr-4 font-bold whitespace-nowrap" style={{ color: hColors[i] }}>{h.hormone}</td><td className="py-3 pr-4 opacity-70 text-xs">{h.triggers}</td><td className="py-3 pr-4 opacity-70 text-xs">{h.effect}</td><td className="py-3 opacity-50 text-xs">{h.risk}</td></tr>)}
              </tbody></table>
            </div>
            <div className="rounded-2xl p-5 md:col-span-2" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
              <h3 className="text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Ключевые цифры</h3>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <StatCard value="66 дн" label="Формирование привычки" sub="Lally 2010" color="#ff6b6b"/><StatCard value="43%" label="Действий автоматичны" sub="Wood 2002" color="#38bdf8"/><StatCard value="+500%" label="Продуктивность в потоке" sub="Kotler" color="#a78bfa"/><StatCard value="×2" label="Loss aversion" sub="Kahneman" color="#ffd93d"/><StatCard value="+210" label="SAT (самоконтроль)" sub="Mischel 1972" color="#34d399"/><StatCard value="50/10/40" label="Генетика/Среда/Действия" sub="Lyubomirsky" color="#ff8fab"/><StatCard value="8 нед" label="Медитация → PFC" sub="Hölzel 2009" color="#fb923c"/><StatCard value="−40%" label="Самоконтроль (<6ч сна)" sub="Walker 2018" color="#f472b6"/>
              </div>
            </div>
            <div className="rounded-2xl p-5 md:col-span-2" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
              <h3 className="text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Распределение по категориям</h3>
              <div className="space-y-2">
                {CATEGORIES.filter(c => c.id !== "all").map(cat => { const count = SOURCES.filter(s => s.cat === cat.id).length; const pct = Math.round((count/SOURCES.length)*100); return (
                  <div key={cat.id} className="flex items-center gap-3"><span className="text-xs w-40 opacity-60 truncate">{cat.label}</span><div className="flex-1 h-4 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.04)" }}><div className="h-full rounded-full flex items-center pl-2" style={{ width: Math.max(pct,5)+"%", background: cat.color+"33" }}><span className="text-xs font-mono font-bold" style={{ color: cat.color }}>{count}</span></div></div></div>
                ); })}
              </div>
            </div>
          </div>
        </div>
      ) : (
        <div className="px-4 sm:px-6 pb-12 max-w-7xl mx-auto">
          <div className="mt-4 mb-4">
            <div className="flex flex-wrap gap-2 mb-4">
              {CATEGORIES.map(cat => <button key={cat.id} onClick={() => setActiveCat(cat.id)} className="px-3 py-1.5 rounded-full text-xs font-medium" style={{ background: activeCat===cat.id?cat.color+"22":"rgba(255,255,255,0.03)", color: activeCat===cat.id?cat.color:"rgba(255,255,255,0.4)", border: "1px solid "+(activeCat===cat.id?cat.color+"44":"rgba(255,255,255,0.06)") }}>{cat.label}{cat.id!=="all" && <span className="ml-1 opacity-50">({SOURCES.filter(s => s.cat===cat.id).length})</span>}</button>)}
            </div>
            <div className="flex flex-wrap gap-3 items-center">
              <input type="text" placeholder="Поиск..." value={search} onChange={e => setSearch(e.target.value)} className="flex-1 min-w-48 px-4 py-2 rounded-xl text-sm bg-transparent outline-none" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#e8e6e1" }}/>
              <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} className="px-3 py-2 rounded-xl text-xs bg-transparent outline-none cursor-pointer" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#aaa" }}><option value="all">Все типы</option><option value="book">Книги</option><option value="paper">Статьи</option></select>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-3 py-2 rounded-xl text-xs bg-transparent outline-none cursor-pointer" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#aaa" }}><option value="impact">По Impact</option><option value="year">По году</option><option value="alpha">По алфавиту</option></select>
              <span className="text-xs opacity-30 font-mono">{filtered.length}/{SOURCES.length}</span>
            </div>
          </div>
          <div className="space-y-2">
            {filtered.map(s => { const isOpen = expanded===s.id; const color = catColor(s.cat); return (
              <div key={s.id} onClick={() => setExpanded(isOpen?null:s.id)} className="rounded-xl cursor-pointer" style={{ background: isOpen?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.015)", border: "1px solid "+(isOpen?color+"33":"rgba(255,255,255,0.04)") }}>
                <div className="flex items-start gap-3 p-4">
                  <div className="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-xs font-bold" style={{ background: color+"15", color }}>{s.type==="book"?"📖":"📄"}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-start justify-between gap-2">
                      <div><h4 className="text-sm font-semibold leading-snug" style={{ color: isOpen?color:"#e8e6e1" }}>{s.title}</h4><p className="text-xs opacity-40 mt-0.5">{s.authors} · {s.journal} · {s.year}</p></div>
                      {s.stat && <div className="flex-shrink-0 text-right"><div className="text-lg font-bold font-mono leading-none" style={{ color, fontFamily: "'Space Mono', monospace" }}>{s.stat}</div>{s.statLabel && <div className="text-xs opacity-30 mt-0.5">{s.statLabel}</div>}</div>}
                    </div>
                    {isOpen && <div className="mt-3 pt-3" style={{ borderTop: "1px solid rgba(255,255,255,0.06)" }}><p className="text-sm opacity-70 leading-relaxed">{s.finding}</p><div className="mt-3 flex items-center gap-3"><span className="text-xs opacity-30 uppercase tracking-wider">Impact</span><div className="flex-1"><ImpactBar value={s.impact} color={color}/></div></div></div>}
                    {!isOpen && <div className="mt-1"><ImpactBar value={s.impact} color={color}/></div>}
                  </div>
                </div>
              </div>
            ); })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
