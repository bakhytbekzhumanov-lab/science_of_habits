function BarChart({ data, color, label }) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data.map(d => Math.abs(d.y)));
  return (
    <div>
      <p className="text-xs opacity-40 mb-2 uppercase tracking-wider">{label}</p>
      <div className="space-y-2">
        {data.map((d, i) => (
          <div key={i} className="flex items-center gap-2">
            <span className="text-xs opacity-50 w-28 text-right truncate">{d.x}</span>
            <div className="flex-1 h-5 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.04)" }}>
              <div className="h-full rounded-full flex items-center px-2" style={{ width: Math.max(Math.abs(d.y) / max * 100, 5) + "%", background: d.y >= 0 ? color + "33" : "#ff6b6b33" }}>
                <span className="text-xs font-mono font-bold" style={{ color: d.y >= 0 ? color : "#ff6b6b" }}>{d.y}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DetailModal({ source, onClose }) {

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [onClose]);

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        {/* Header */}
        <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center text-lg" style={{ background: "rgba(255,255,255,0.05)" }}>×</button>
        <div className="flex items-center gap-3 mb-4">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center text-xl" style={{ background: color + "20" }}>{source.type === "book" ? "📖" : "📄"}</div>

        </div>

                <path d="M 90 90 L 90 20 A 70 70 0 1 1 34.6 145 Z" fill="#6b7280" opacity="0.8"/>
                <path d="M 90 90 L 34.6 145 A 70 70 0 0 1 68.4 22.6 Z" fill="#9ca3af" opacity="0.8"/>
                <path d="M 90 90 L 68.4 22.6 A 70 70 0 0 1 90 20 Z" fill="#22c55e" opacity="0.8"/>
                <text x="120" y="75" fill="white" fontSize="9" fontWeight="bold" fontFamily="monospace">50%</text>
                <text x="40" y="130" fill="white" fontSize="9" fontWeight="bold" fontFamily="monospace">40%</text>
                <text x="55" y="50" fill="white" fontSize="9" fontWeight="bold" fontFamily="monospace">10%</text>
                {[{l:"Генетика",c:"#6b7280",y:50},{l:"Обстоятельства",c:"#9ca3af",y:78},{l:"Действия",c:"#22c55e",y:106}].map((d,i) => <g key={i}><rect x="190" y={d.y} width="12" height="12" rx="3" fill={d.c}/><text x="208" y={d.y+10} fill="rgba(255,255,255,0.7)" fontSize="11">{d.l}</text></g>)}
              </svg>
            </div>
            <div className="rounded-2xl p-5 md:col-span-2 overflow-x-auto" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
              <h3 className="text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Гормоны счастья</h3>
              <table className="w-full text-sm"><thead><tr className="text-left opacity-40 uppercase text-xs tracking-wider"><th className="pb-3 pr-4">Гормон</th><th className="pb-3 pr-4">Триггеры</th><th className="pb-3 pr-4">Эффект</th><th className="pb-3">Риск</th></tr></thead><tbody>
                {HORMONES.map((h,i) => <tr key={i} className="border-t" style={{ borderColor: "rgba(255,255,255,0.04)" }}><td className="py-3 pr-4 font-bold whitespace-nowrap" style={{ color: h.color }}>{h.hormone}</td><td className="py-3 pr-4 opacity-70 text-xs">{h.triggers}</td><td className="py-3 pr-4 opacity-70 text-xs">{h.effect}</td><td className="py-3 opacity-50 text-xs">{h.risk}</td></tr>)}
              </tbody></table>
            </div>
            <div className="rounded-2xl p-5 md:col-span-2" style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)" }}>
              <h3 className="text-sm font-bold uppercase tracking-wider opacity-50 mb-4">Ключевые цифры</h3>
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <StatCard value="66 дн" label="Формирование привычки" sub="Lally 2010" color="#ff6b6b"/><StatCard value="43%" label="Действий автоматичны" sub="Wood 2002" color="#38bdf8"/><StatCard value="+500%" label="Продуктивность (поток)" sub="Kotler" color="#a78bfa"/><StatCard value="×2" label="Loss aversion" sub="Kahneman" color="#ffd93d"/><StatCard value="+210" label="SAT (самоконтроль)" sub="Mischel" color="#34d399"/><StatCard value="50/10/40" label="Генетика/Среда/Действия" sub="Lyubomirsky" color="#ff8fab"/><StatCard value="8 нед" label="Медитация→PFC" sub="Hölzel" color="#fb923c"/><StatCard value="−40%" label="Контроль (<6ч сна)" sub="Walker" color="#f472b6"/>
              </div>
            </div>
          </div>
        </div>
      ) : (
        <div className="px-4 sm:px-6 pb-12 max-w-7xl mx-auto">
          <div className="mt-4 mb-4">
            <div className="flex flex-wrap gap-2 mb-4">
              {CATEGORIES.map(cat => <button key={cat.id} onClick={() => setActiveCat(cat.id)} className="px-3 py-1.5 rounded-full text-xs font-medium" style={{ background: activeCat===cat.id?cat.color+"22":"rgba(255,255,255,0.03)", color: activeCat===cat.id?cat.color:"rgba(255,255,255,0.4)", border: "1px solid "+(activeCat===cat.id?cat.color+"44":"rgba(255,255,255,0.06)") }}>{cat.label}{cat.id!=="all" && <span className="ml-1 opacity-50">({SOURCES.filter(s=>s.cat===cat.id).length})</span>}</button>)}
            </div>
            <div className="flex flex-wrap gap-3 items-center">
              <input type="text" placeholder="Поиск..." value={search} onChange={e => setSearch(e.target.value)} className="flex-1 min-w-48 px-4 py-2 rounded-xl text-sm bg-transparent outline-none" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#e8e6e1" }}/>
              <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)} className="px-3 py-2 rounded-xl text-xs bg-transparent outline-none" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#aaa" }}><option value="all">Все</option><option value="book">📖 Книги</option><option value="paper">📄 Статьи</option></select>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="px-3 py-2 rounded-xl text-xs bg-transparent outline-none" style={{ border: "1px solid rgba(255,255,255,0.08)", color: "#aaa" }}><option value="impact">Impact</option><option value="year">Год</option><option value="alpha">A-Z</option></select>
              <span className="text-xs opacity-30 font-mono">{filtered.length}/{SOURCES.length}</span>
            </div>
          </div>
          <div className="space-y-2">
            {filtered.map(s => { const color = catColor(s.cat); return (
              <div key={s.id} onClick={() => setSelectedSource(s)} className="rounded-xl cursor-pointer hover:scale-[1.01] transition-transform" style={{ background: "rgba(255,255,255,0.015)", border: "1px solid rgba(255,255,255,0.04)" }}>
                <div className="flex items-start gap-3 p-4">
                  <div className="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-base" style={{ background: color+"15" }}>{s.type==="book"?"📖":"📄"}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-start justify-between gap-2">
                      <div><h4 className="text-sm font-semibold leading-snug">{s.title}</h4><p className="text-xs opacity-40 mt-0.5">{s.authors} · {s.year}</p></div>
                      {s.stat && <div className="flex-shrink-0 text-right"><div className="text-lg font-bold font-mono leading-none" style={{ color, fontFamily:"'Space Mono',monospace" }}>{s.stat}</div>{s.statLabel && <div className="text-xs opacity-30 mt-0.5">{s.statLabel}</div>}</div>}
                    </div>
                    <div className="mt-1"><ImpactBar value={s.impact} color={color}/></div>
                  </div>
                  <div className="flex-shrink-0 opacity-20 text-lg">›</div>
                </div>
              </div>
            ); })}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
